services:
  yana-robots:
    build: .
    image: yana-robots:latest
    container_name: yana-robots
    restart: unless-stopped
    ports:
      - "${PORT:-5000}:5000"
    environment:
      TELEMETRY_SOURCE: ${TELEMETRY_SOURCE:-simulator}
      UPDATE_HZ: ${UPDATE_HZ:-5}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
